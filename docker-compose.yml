version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sre_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sre}
      POSTGRES_USER: ${POSTGRES_USER:-sre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sre_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sre}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sre_net

  redis:
    image: redis:7-alpine
    container_name: sre_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sre_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sre_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sre}:${POSTGRES_PASSWORD:-sre_secret}@postgres:5432/${POSTGRES_DB:-sre}
      - REDIS_URL=redis://redis:6379/0
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - HF_API_KEY=${HF_API_KEY}
      - MEMBRAIN_API_KEY=${MEMBRAIN_API_KEY:-mb_live_t1FM0Uxfvq_Ks-BW8cafFKmd8iMXEx5xm50lI2_bD84}
      - MEMBRAIN_BASE_URL=https://api.membrain.ai/v1
      - FAISS_INDEX_PATH=/app/data/faiss
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - LOG_LEVEL=DEBUG
      - GAP_DENSITY_THRESHOLD=0.3
      - FAISS_DIMENSION=384
    volumes:
      - faiss_data:/app/data/faiss
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sre_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sre_celery
    restart: unless-stopped
    command: celery -A core.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sre}:${POSTGRES_PASSWORD:-sre_secret}@postgres:5432/${POSTGRES_DB:-sre}
      - REDIS_URL=redis://redis:6379/0
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - HF_API_KEY=${HF_API_KEY}
      - MEMBRAIN_API_KEY=${MEMBRAIN_API_KEY:-mb_live_t1FM0Uxfvq_Ks-BW8cafFKmd8iMXEx5xm50lI2_bD84}
      - MEMBRAIN_BASE_URL=https://api.membrain.ai/v1
      - FAISS_INDEX_PATH=/app/data/faiss
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - faiss_data:/app/data/faiss
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sre_net

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sre_celery_beat
    restart: unless-stopped
    command: celery -A core.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sre}:${POSTGRES_PASSWORD:-sre_secret}@postgres:5432/${POSTGRES_DB:-sre}
      - REDIS_URL=redis://redis:6379/0
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - HF_API_KEY=${HF_API_KEY}
      - MEMBRAIN_API_KEY=${MEMBRAIN_API_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - faiss_data:/app/data/faiss
      - ./backend:/app
    depends_on:
      - celery_worker
    networks:
      - sre_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_WS_URL=${VITE_WS_URL:-}
    container_name: sre_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - sre_net

  nginx:
    image: nginx:alpine
    container_name: sre_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sre_net

volumes:
  postgres_data:
  redis_data:
  faiss_data:

networks:
  sre_net:
    driver: bridge
